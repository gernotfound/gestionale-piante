<!-- Registrazione Service Worker per PWA -->
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(registration => {
                console.log('PWA ServiceWorker registrato.');
                registration.addEventListener('updatefound', () => {
                    const newWorker = registration.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('Nuovo aggiornamento disponibile!');
                            // Ricarica la pagina silenziosamente per applicare il nuovo codice di GitHub
                            window.location.reload(); 
                        }
                    });
                });
            }).catch(error => {
                console.log('Registrazione PWA fallita:', error);
            });
        });
    }
</script>

<!-- Importiamo il nostro JavaScript separato -->
<script src="script.js"></script>

</body>
</html>
